server:
  raw_requests: false

app:
  timeout: 30
  browser_path: /headless-shell/headless-shell
  leakless: true

cache:
  ttl_seconds: 604800
  max_size: 10000

resilience:
  max_retries: 0
  allow_endpoint_fallback: false

circuit_breaker:
  failures: 3
  recovery_seconds: 180
  successes: 1

google:
  rate_requests: 2
  rate_seconds: 60
  rate_burst: 1

bing:
  rate_requests: 10
  rate_seconds: 60
  rate_burst: 1

duckduckgo:
  rate_requests: 10
  rate_seconds: 60
  rate_burst: 1
